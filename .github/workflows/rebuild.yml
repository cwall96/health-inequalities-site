# Weekly rebuild so OpenAlex publications refresh on their own.
# Set a repo secret BUILD_HOOK_URL to your Netlify/Cloudflare build hook URL.
name: Weekly rebuild
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: curl -fsS -X POST -d '{}' "${{ secrets.BUILD_HOOK_URL }}"
